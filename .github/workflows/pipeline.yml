name: ML Model Validation and Deployment Pipeline (Single Job)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  validate-and-deploy:
    name: Validate and Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn numpy pandas
      
      - name: Train model
        run: python train.py
      
      - name: Check model threshold
        run: python check_threshold.py
      
      - name: Mock Docker build
        if: success()
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "========================================="
          echo "🐳 Building Docker image for Run ID: $RUN_ID"
          echo "========================================="
          echo "docker build --build-arg RUN_ID=$RUN_ID -t my-model:$RUN_ID ."
          echo "✅ Mock build completed successfully!"
      
      - name: Deploy to registry (mock)
        if: success()
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "========================================="
          echo "🚀 Deploying image to registry: my-model:$RUN_ID"
          echo "========================================="
          echo "✅ Deployment completed successfully!"
